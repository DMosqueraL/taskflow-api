services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234Admin
      POSTGRES_DB: taskflow_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "3005:3005"
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://postgres:1234Admin@postgres:5432/taskflow_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: mi_secreto_super_seguro_taskflow
      JWT_REFRESH_SECRET: mi_otro_secreto_refresh_taskflow
      PORT: 3005
    depends_on:
      - postgres
      - redis

volumes:
  pgdata: